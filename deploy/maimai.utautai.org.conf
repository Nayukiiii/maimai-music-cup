server {
    server_name maimai.utautai.org;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/maimai.utautai.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/maimai.utautai.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = maimai.utautai.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name maimai.utautai.org;
    return 404; # managed by Certbot
}
