<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">MAIMAI CUP fallback jacket</title>
  <desc id="desc">A neon arcade-style fallback cover for a missing song jacket.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182247"/>
      <stop offset=".52" stop-color="#11152d"/>
      <stop offset="1" stop-color="#2a1235"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66e6ef"/>
      <stop offset=".5" stop-color="#ff70ba"/>
      <stop offset="1" stop-color="#ffe079"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9ef7ff" stroke-opacity=".08"/>
    </pattern>
  </defs>
  <rect width="640" height="640" fill="url(#bg)"/>
  <rect width="640" height="640" fill="url(#grid)"/>
  <circle cx="320" cy="290" r="178" fill="none" stroke="url(#ring)" stroke-width="18" opacity=".9"/>
  <circle cx="320" cy="290" r="132" fill="#090b18" stroke="#fff" stroke-opacity=".15" stroke-width="3"/>
  <circle cx="320" cy="290" r="28" fill="url(#ring)"/>
  <path d="M320 115v52M320 413v52M145 290h52M443 290h52" stroke="#fff" stroke-opacity=".75" stroke-width="8" stroke-linecap="round"/>
  <text x="320" y="535" fill="#fff" font-family="Arial, sans-serif" font-size="48" font-weight="900" text-anchor="middle" letter-spacing="5">MAIMAI CUP</text>
  <text x="320" y="579" fill="#9ef7ff" font-family="Arial, sans-serif" font-size="21" font-weight="700" text-anchor="middle" letter-spacing="4">JACKET LOADING</text>
</svg>
